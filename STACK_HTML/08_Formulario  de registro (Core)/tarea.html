<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro(Core)</title>
    <h1>Crea una cuenta en Discord</h1>
</head>

<body>
    <form action="/registro" method="post">
        <div>
            <label for="Nombre">Nombre:</label>
            <input type="text" id="Nombre" name="Nombre" placeholder="Ingresa tu Nombre">
        </div>
        <br>
        <div>
            <label for="Apellido">Apellido:</label>
            <input type="text" id="Apellido" name="Apellido" placeholder="Ingresa tu Apellido">
        </div>
        <br>
        <div>
            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo" name="correo" placeholder="Ingresa tu correo">
        </div>
        <br>
        <div>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="Contraseña" placeholder="Ingresa tu contraseña" />
        </div>
        <br>
        <div>
            <label for="contraseña">Confirmar contraseña:</label>
            <input type="password" id="contraseña" name="Confirmar contraseña" placeholder="Confirma tu contraseña" />
        </div>
        <br>
        <div>
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha">
        </div>
        <br>
        <div>
            <label for="genero">Genero:</label>
            <input type="radio" id="fecha" name="genero" value="Masculino"> Masculino
            <input type="radio" id="fecha" name="genero" value="Femenino"> Femenino
            <input type="radio" id="fecha" name="genero" value="Prefiero no decirlo"> Prefiero no decirlo
        </div>
        <div>
            <label for="Descripción sobre ti">Descripción sobre ti:</label> <br>
            <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
        </div>
        <div>
            <label for="intereses">Selecciona tus intereses:</label> <br>
            <select size="4">
                <option value="Música">Música</option>
                <option value="Películas">Películas</option>
                <option value="Deportes">Deportes</option>
                <option value="Tecnología">Tecnología</option>
            </select>
        </div>
        <div>
            <input type="checkbox" id="acepto" name="acepto" />
            <label for="acepto">Acepto los <a href="https://discord-com.translate.goog/terms?_x_tr_sl=en&_x_tr_tl=es&_x_tr_hl=es&_x_tr_pto=tc"> Términos y condiciones </a> de Discord.</label>
        </div>
        <div>
            <input type="submit" value="Registrarse">
        </div>
    </form>
</body>

</html>
